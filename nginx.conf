server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Health check endpoint for Docker
  location /health {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
  }

  # Vite SPA fallback — all routes serve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
