###############################################################################
# gulf-frontend — Medusa v2 Storefront
# Deployed via Portainer "Stack from Git repo"
# Image built by GitHub Actions and pushed to GHCR
###############################################################################

networks:
  proxy:
    external: true

services:
  gulf:
    image: ghcr.io/lordrammx/gulf-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.gulf.rule=Host(`gulf.yupiyes.com`)"
      - "traefik.http.routers.gulf.entrypoints=websecure"
      - "traefik.http.routers.gulf.tls=true"
      - "traefik.http.routers.gulf.tls.certresolver=le"
      - "traefik.http.services.gulf.loadbalancer.server.port=80"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.gulf-http.rule=Host(`gulf.yupiyes.com`)"
      - "traefik.http.routers.gulf-http.entrypoints=web"
      - "traefik.http.routers.gulf-http.middlewares=gulf-redirect"
      - "traefik.http.middlewares.gulf-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.gulf-redirect.redirectscheme.permanent=true"
