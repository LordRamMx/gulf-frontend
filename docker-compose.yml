version: "3.9"

services:
  delta:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_MEDUSA_BACKEND_URL: ${VITE_MEDUSA_BACKEND_URL}
        VITE_MEDUSA_PUBLISHABLE_KEY: ${VITE_MEDUSA_PUBLISHABLE_KEY}
        VITE_MEDUSA_REGION_ID: ${VITE_MEDUSA_REGION_ID}

    image: delta:git
    restart: unless-stopped
    networks:
      - proxy

    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy

      # HTTPS
      - traefik.http.routers.delta.rule=Host(`delta.yupiyes.com`)
      - traefik.http.routers.delta.entrypoints=websecure
      - traefik.http.routers.delta.tls=true
      - traefik.http.routers.delta.tls.certresolver=le
      - traefik.http.services.delta.loadbalancer.server.port=80

      # HTTP -> HTTPS
      - traefik.http.routers.delta-http.rule=Host(`delta.yupiyes.com`)
      - traefik.http.routers.delta-http.entrypoints=web
      - traefik.http.routers.delta-http.middlewares=delta-redirect
      - traefik.http.middlewares.delta-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.delta-redirect.redirectscheme.permanent=true

networks:
  proxy:
    external: true
