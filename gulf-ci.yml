name: Build & Push gulf-frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO_OWNER: lordrammx
  IMAGE_NAME: gulf-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build & push gulf-frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: run
          push: true
          build-args: |
            VITE_MEDUSA_BACKEND_URL=${{ secrets.VITE_MEDUSA_BACKEND_URL }}
            VITE_MEDUSA_PUBLISHABLE_KEY=${{ secrets.VITE_MEDUSA_PUBLISHABLE_KEY }}
            VITE_MEDUSA_REGION_ID=${{ secrets.VITE_MEDUSA_REGION_ID }}
            VITE_MERCADOPAGO_PUBLIC_KEY=${{ secrets.VITE_MERCADOPAGO_PUBLIC_KEY }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Trigger Portainer redeploy
        run: |
          curl -s -X POST "${{ secrets.PORTAINER_GULF_WEBHOOK }}"
